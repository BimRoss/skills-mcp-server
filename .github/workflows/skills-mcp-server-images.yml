name: skills-mcp-server-images

permissions:
  contents: read

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: geeemoney/skills-mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./... -count=1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=build,enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          provenance: false
          sbom: false
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gitops-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: test-build
    env:
      RANCHER_ADMIN_REPO: bimross/rancher-admin
    steps:
      - name: Compute release tag
        id: release
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Checkout rancher-admin
        uses: actions/checkout@v6
        with:
          repository: ${{ env.RANCHER_ADMIN_REPO }}
          ref: master
          token: ${{ secrets.RANCHER_ADMIN_REPO_TOKEN }}
          path: rancher-admin
          fetch-depth: 0

      - name: Update skills-mcp-server image tag
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          tag = os.environ["TAG"]
          path = Path("rancher-admin/admin/apps/skills-mcp-server/deployment.yaml")
          content = path.read_text()
          pattern = r"(geeemoney/skills-mcp-server:)[^\s\"']+"
          updated = re.sub(pattern, lambda m: f"{m.group(1)}{tag}", content)
          path.write_text(updated)
          PY

      - name: Commit and push manifest updates
        working-directory: rancher-admin
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if git diff --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git config user.name "skills-mcp-server-ci"
          git config user.email "skills-mcp-server-ci@users.noreply.github.com"
          git add admin/apps/skills-mcp-server/deployment.yaml
          git commit -m "release(skills-mcp-server): bump image to ${TAG}"
          for attempt in 1 2 3; do
            if git push origin master; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "Push failed after ${attempt} attempts."
              exit 1
            fi
            echo "Push race detected; rebasing onto latest origin/master and retrying."
            git pull --rebase origin master
          done
