name: skills-mcp-server-images

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./... -count=1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: geeemoney/skills-mcp-server
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gitops-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: test-build
    permissions:
      contents: read
    steps:
      - name: Checkout rancher-admin
        uses: actions/checkout@v6
        with:
          repository: bimross/rancher-admin
          token: ${{ secrets.RANCHER_ADMIN_REPO_TOKEN }}
          path: rancher-admin

      - name: Update deployment image tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          path = Path("rancher-admin/admin/apps/skills-mcp-server/deployment.yaml")
          content = path.read_text()
          tag = os.environ["TAG"]
          content = re.sub(r"(image:\s*geeemoney/skills-mcp-server:)([^\s]+)", rf"\g<1>{tag}", content)
          path.write_text(content)
          PY

      - name: Commit and push
        working-directory: rancher-admin
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin/apps/skills-mcp-server/deployment.yaml
          git commit -m "chore: bump skills-mcp-server image to ${TAG}"
          git pull --rebase origin master
          git push origin HEAD:master
